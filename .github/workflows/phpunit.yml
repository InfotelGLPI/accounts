name: PHPUnit

on:
  push:
  pull_request:

jobs:
  unit-tests:
    name: Unit tests (PHP ${{ matrix.php-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php-version: ["8.3", "8.4"]

    steps:
      - name: Checkout GLPI core (shallow)
        uses: actions/checkout@v4
        with:
          repository: glpi-project/glpi
          ref: 11.0/bugfixes
          path: glpi

      - name: Checkout plugin
        uses: actions/checkout@v4
        with:
          path: glpi/marketplace/accounts

      - name: Setup PHP ${{ matrix.php-version }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: mbstring, openssl
          coverage: none

      - name: Install GLPI Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress
        working-directory: glpi

      - name: Run unit tests
        run: >
          php vendor/bin/phpunit
          --configuration marketplace/accounts/phpunit.xml
          --testsuite Tests
          --filter AccountCryptoTest
        working-directory: glpi
